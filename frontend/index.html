<!DOCTYPE html>
<html>
<head>

<title>Food Recipes</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}

.container{
width:90%;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#ff9800;
color:white;
}

.btn{
padding:8px 12px;
border-radius:5px;
text-decoration:none;
color:white;
}

.add{background:green;}
.edit{background:blue;}
.delete{background:red;}

</style>

</head>

<body>

<div class="container">

<h1>🍽 Food Recipe Manager</h1>

<a href="/create" class="btn add">Add Recipe</a>

<br><br>

<table>

<tr>

<th>ID</th>

<th>Recipe</th>

<th>Category</th>

<th>Ingredients</th>

<th>Instructions</th>

<th>Actions</th>

</tr>

{% for recipe in recipes %}

<tr>

<td>{{recipe.id}}</td>

<td>{{recipe.title}}</td>

<td>{{recipe.category}}</td>

<td>{{recipe.ingredients}}</td>

<td>{{recipe.instructions}}</td>

<td>

<a href="/update/{{recipe.id}}" class="btn edit">Edit</a>

<a href="/delete/{{recipe.id}}" class="btn delete">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
